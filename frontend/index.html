<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontline Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        document.documentElement.dataset.theme = localStorage.getItem("vps-monitor-theme") || "graphite";
      } catch (error) {
        document.documentElement.dataset.theme = "graphite";
      }
    })();
  </script>
  <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body data-default-theme="graphite">
  <div class="atmosphere"></div>
  <div class="gridfield"></div>
  <div id="app"></div>
  <script src="/frontend/app.js" defer></script>
</body>
</html>
